 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote App</title>
 <link rel="stylesheet"href="style.css"
</head>
<body>

  <h1>Quote App</h1>

  <!-- Random Quote Display -->
  <div id="quoteDisplay">Click "Show Random Quote" to begin</div>

  <!-- Buttons for Actions -->
  <button onclick="showRandomQuote()">Show Random Quote</button>
  <button onclick="exportToJsonFile()">Export Quotes</button>
  <input type="file" id="importFile" accept=".json" onchange="importFromJsonFile(event)" />

  <!-- Dynamic Add Quote Form -->
  <div id="addQuoteForm"></div>

  <!-- Link to Script -->
  <script src="script.js"></script>

</body>
</html>
